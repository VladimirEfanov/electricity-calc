    async function syncToGoogleDrive() {
        const token = localStorage.getItem('google_access_token');
        if (!token) {
            showMessage('❌ Войдите в Google аккаунт', 'error');
            return false;
        }

        const data = {
            dynamicTariffs: dynamicTariffs,
            appSettings: appSettings,
            version: APP_VERSION,
            exportDate: new Date().toISOString()
        };

        const fileContent = JSON.stringify(data, null, 2);

        try {
            const fileId = await getGoogleDriveFileId(token);

            if (fileId) {
                await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: fileContent
                });
            } else {
                const metadata = {
                    name: 'electricity_calculator_data.json',
                    mimeType: 'application/json',
                    parents: ['root']
                };
                const form = new FormData();
                form.append('metadata', new Blob([JSON.stringify(metadata)], {type: 'application/json'}));
                form.append('file', new Blob([fileContent], {type: 'application/json'}));

                await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                    method: 'POST',
                    headers: {'Authorization': `Bearer ${token}`},
                    body: form
                });
            }

            showMessage('✅ Данные сохранены в Google Drive', 'success');

            // Обновляем индикатор облачка
            if (typeof updateGitHubIndicator === 'function') updateGitHubIndicator();

            return true;
        } catch (err) {
            console.error('Google Drive sync error:', err);
            showMessage('❌ Ошибка сохранения в Google Drive', 'error');
            return false;
        }
    }

    async function getGoogleDriveFileId(token) {
        const res = await fetch('https://www.googleapis.com/drive/v3/files?q=name=\'electricity_calculator_data.json\' and trashed=false&fields=files(id)', {
            headers: {'Authorization': `Bearer ${token}`}
        });
        const data = await res.json();
        return data.files?.[0]?.id || null;
    }

    async function loadFromGoogleDrive() {
        // Убираем empty-state
        const emptyState = document.querySelector('.empty-state');
        if (emptyState) emptyState.remove();
        const token = localStorage.getItem('google_access_token');
        if (!token) {
            showMessage('❌ Войдите в Google аккаунт', 'error');
            return false;
        }

        try {
            const fileId = await getGoogleDriveFileId(token);
            if (!fileId) {
                showMessage('⚠️ Файл не найден в Google Drive. Создайте тарифы и сохраните вручную.', 'info');
                // Убираем empty-state, если есть
                const emptyState = document.querySelector('.empty-state');
                if (emptyState) emptyState.remove();
                return false;
            }

            const res = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
                headers: {'Authorization': `Bearer ${token}`}
            });
            const cloudData = await res.json();

            if (!cloudData.dynamicTariffs || !cloudData.dynamicTariffs.tariffs || cloudData.dynamicTariffs.tariffs.length === 0) {
                showMessage('⚠️ Файл пуст. Создайте тарифы и сохраните вручную.', 'info');
                const emptyState = document.querySelector('.empty-state');
                if (emptyState) emptyState.remove();
                return false;
            }

            dynamicTariffs = cloudData.dynamicTariffs;
            appSettings = {...appSettings, ...cloudData.appSettings};

            localStorage.setItem('dynamicTariffs', JSON.stringify(dynamicTariffs));
            localStorage.setItem('appSettings', JSON.stringify(appSettings));

            showMessage('✅ Данные загружены из Google Drive', 'success');

            // Убираем empty-state
            const emptyState = document.querySelector('.empty-state');
            if (emptyState) emptyState.remove();

            // Обновляем интерфейс
            if (typeof renderCarousel === 'function') renderCarousel();
            if (typeof updateCarouselPositions === 'function') updateCarouselPositions();

            if (dynamicTariffs.tariffs.length > 0) {
                const firstTariff = dynamicTariffs.tariffs[0];
                if (typeof switchToDynamicTariff === 'function') {
                    switchToDynamicTariff(firstTariff.id);
                }
            }

            if (typeof updateGitHubIndicator === 'function') updateGitHubIndicator();
            if (typeof updateSyncProviderContent === 'function') updateSyncProviderContent();

            return true;
        } catch (err) {
            console.error('Google Drive load error:', err);
            showMessage('❌ Ошибка загрузки из Google Drive', 'error');
            return false;
        }
    }

    function setSyncProvider(provider) {
        appSettings.syncProvider = provider;
        localStorage.setItem('appSettings', JSON.stringify(appSettings));

        if (provider === 'github') {
            githubSettings.enabled = true;
            localStorage.setItem('githubSettings', JSON.stringify(githubSettings));
        } else {
            githubSettings.enabled = false;
            localStorage.setItem('githubSettings', JSON.stringify(githubSettings));
        }

        if (provider === 'google') {
            if (googleAuth && !googleAuth.isSignedIn.get()) {
                loginGoogle();
            }
        }

        showSettings();
        showMessage(`✅ Синхронизация: ${provider === 'local' ? 'локально' : provider === 'github' ? 'GitHub' : 'Google Drive'}`, 'success');
    }

    async function checkGitHubHasData() {
        if (!githubSettings.token || !githubSettings.gistId) return false;
        try {
            const response = await fetch(`https://api.github.com/gists/${githubSettings.gistId}`, {
                headers: {'Authorization': `token ${githubSettings.token}`}
            });
            if (!response.ok) return false;
            const gist = await response.json();
            const content = gist.files['electricity_data.json']?.content;
            if (!content) return false;
            const data = JSON.parse(content);
            return data.dynamicTariffs?.tariffs?.length > 0;
        } catch (e) {
            return false;
        }
    }

    async function checkGoogleDriveHasData() {
        const token = localStorage.getItem('google_access_token');
        if (!token) return false;
        try {
            const res = await fetch('https://www.googleapis.com/drive/v3/files?q=name=\'electricity_calculator_data.json\'&fields=files(id)', {
                headers: {'Authorization': `Bearer ${token}`}
            });
            const data = await res.json();
            if (!data.files || data.files.length === 0) return false;
            const fileId = data.files[0].id;
            const contentRes = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
                headers: {'Authorization': `Bearer ${token}`}
            });
            const content = await contentRes.json();
            return content.dynamicTariffs?.tariffs?.length > 0;
        } catch (e) {
            return false;
        }
    }
