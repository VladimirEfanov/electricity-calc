    function calculateDynamic(tariffId) {
        const tariff = dynamicTariffs.tariffs.find(t => t.id === tariffId);
        if (!tariff) {
            showMessage('❌ Тариф не найден', 'error');
            document.getElementById(`tariff_${tariffId}_result`).style.display = 'none';
            return null;
        }

        const month = parseInt(document.getElementById(`tariff_${tariffId}_month`).value);
        const year = parseInt(document.getElementById(`tariff_${tariffId}_year`).value);
        const isTwoTariff = tariff.type === 'two';
        const zonesCount = isTwoTariff ? 2 : 3;

        // Проверка блокировки месяцев
        if (isMonthBlocked(month, year, tariffId)) {
            showMessage('❌ Этот месяц заблокирован (до начала учета).', 'error');
            document.getElementById(`tariff_${tariffId}_result`).style.display = 'none';
            return null;
        }

        // ВАЛИДАЦИЯ ВВОДА
        const validation = validateTariffInputs(tariffId);
        if (!validation.isValid) {
            showMessage(validation.message, 'error', 5000);
            document.getElementById(`tariff_${tariffId}_result`).style.display = 'none';
            return null;
        }

        // Расчет (без повторных проверок)
        let totalConsumption = 0;
        let totalCost = 0;
        let results = [];
        let resultHTML = '';

        for (let i = 1; i <= zonesCount; i++) {
            const startInput = document.getElementById(`tariff_${tariffId}_t${i}_start`);
            const endInput = document.getElementById(`tariff_${tariffId}_t${i}_end`);

            const start = parseInt(startInput ? startInput.value : 0) || 0;
            const end = parseInt(endInput ? endInput.value : 0) || 0;
            const tariffPrice = tariff.tariffs[`t${i}`];

            const consumption = Math.max(0, end - start);
            const discount = appSettings.globalDiscount || 0;
            const discountMultiplier = (100 - discount) / 100;
            const cost = consumption * tariffPrice * discountMultiplier;

            totalConsumption += consumption;
            totalCost += cost;

            results.push({
                zone: tariff.zones[i - 1],
                hours: tariff.hours[i - 1],
                start,
                end,
                consumption,
                tariffPrice,
                cost
            });

            resultHTML += `
                <div class="result-item">
                    <span>${tariff.zones[i - 1]} (${tariff.hours[i - 1]}):</span>
                    <span>${consumption} кВт·ч</span>
                </div>
                <div class="result-item">
                    <span>Стоимость Т${i}:</span>
                    <span>${cost.toFixed(2)} руб.</span>
                </div>
            `;
        }

        // Итоги
        resultHTML += `
            <div class="result-item total">
                <span>Общее потребление:</span>
                <span>${totalConsumption} кВт·ч</span>
            </div>
            <div class="result-item total">
                <span>Общая стоимость:</span>
                <span>${totalCost.toFixed(2)} руб.</span>
            </div>
        `;

        // Показываем результат
        const resultContent = document.getElementById(`tariff_${tariffId}_result_content`);
        const resultContainer = document.getElementById(`tariff_${tariffId}_result`);

        if (resultContent && resultContainer) {
            resultContent.innerHTML = resultHTML;
            resultContainer.style.display = 'block';
            resultContainer.scrollIntoView({behavior: 'smooth', block: 'nearest'});
        }

        return {
            tariffId,
            month,
            year,
            totalConsumption,
            totalCost,
            results,
            timestamp: Date.now(),
            date: new Date().toISOString()
        };
    }

    function updateDataInfo(tariffId, show = true) {
        const infoDiv = document.getElementById(`tariff_${tariffId}_data_info`);
        if (!infoDiv) return;

        if (show) {
            infoDiv.innerHTML = '✅ Данные успешно сохранены';
            infoDiv.style.display = 'block';
            infoDiv.style.color = 'var(--success-color)';
            infoDiv.style.background = 'rgba(16, 185, 129, 0.1)';

            setTimeout(() => {
                infoDiv.style.display = 'none';

    function canAddRecord() {
        // Если уже активирована — без ограничений
        if (appSettings.isPaid) return true;

        // Считаем все записи во всех тарифах
        let totalRecords = 0;
        dynamicTariffs.tariffs.forEach(tariff => {
            totalRecords += tariff.data?.calculations?.length || 0;
        });

        // Лимит 6 записей в бесплатной версии
        const FREE_LIMIT = 6;

        if (totalRecords >= FREE_LIMIT) {
            showMessage(`⚠️ В бесплатной версии можно сохранить только ${FREE_LIMIT} записей. Приобретите полную версию.`, 'warning', 5000);
            return false;
        }

        return true;
    }

    function saveDynamicCalculation(tariffId) {
        if (!appSettings.isPaid && dynamicTariffs.tariffs.reduce((sum, t) => sum + (t.data?.calculations?.length || 0), 0) >= 6) {
            showMessage('⚠️ Бесплатная версия: только 6 записей. Приобретите полную версию.', 'warning', 5000);
            return;
        }
        const tariff = dynamicTariffs.tariffs.find(t => t.id === tariffId);
        if (!tariff) {
            showMessage('❌ Тариф не найден', 'error');
            return;
        }

        const month = parseInt(document.getElementById(`tariff_${tariffId}_month`).value);
        const year = parseInt(document.getElementById(`tariff_${tariffId}_year`).value);
        const isTwoTariff = tariff.type === 'two';
        const zonesCount = isTwoTariff ? 2 : 3;

        // ДОПОЛНИТЕЛЬНАЯ ПРОВЕРКА ПЕРЕД СОХРАНЕНИЕМ
        const canEdit = canEditCurrentMonth(tariffId, month, year) && !isMonthBlocked(month, year, tariffId);

        if (!canEdit) {
            // Находим самую новую запись для подсказки
            const newestRecord = tariff.data?.calculations?.[0];
            if (newestRecord) {
                showMessage(
                    `❌ Нельзя редактировать ${monthNames[month]} ${year}, так как есть более новая запись за ${monthNames[newestRecord.month]} ${newestRecord.year}. Сначала удалите более новые записи.`,
                    'error',
                    5000
                );
            } else {
                showMessage('❌ Этот месяц заблокирован для редактирования', 'error');
            }
            return;
        }

        // Выполняем расчет
        const calculation = calculateDynamic(tariffId);
        if (!calculation) return;

        // СОЗДАЁМ ЗАПИСЬ
        const now = Date.now();
        const data = {
            id: now,
            tariffId: tariffId,
            month: month,
            year: year,
            date: new Date().toLocaleString('ru-RU'),
            timestamp: now,
            updatedAt: new Date().toISOString(),
            totalConsumption: calculation.totalConsumption,
            totalCost: calculation.totalCost,
            zones: []
        };

        // Добавляем данные по зонам
        for (let i = 1; i <= zonesCount; i++) {
            const startInput = document.getElementById(`tariff_${tariffId}_t${i}_start`);
            const endInput = document.getElementById(`tariff_${tariffId}_t${i}_end`);

            const start = parseInt(startInput ? startInput.value : 0) || 0;
            const end = parseInt(endInput ? endInput.value : 0) || 0;

            data.zones.push({
                zone: tariff.zones[i - 1],
                hours: tariff.hours[i - 1],
                start: start,
                end: end,
                consumption: calculation.results[i - 1].consumption,
                tariffPrice: tariff.tariffs[`t${i}`],
                cost: calculation.results[i - 1].cost
            });
        }

        // Инициализируем data если нет
        if (!tariff.data) {
            tariff.data = {calculations: []};
        }
        if (!tariff.data.calculations) {
            tariff.data.calculations = [];
        }

        // Проверяем нет ли уже записи за этот месяц
        const existingIndex = tariff.data.calculations.findIndex(c =>
            c.month === month && c.year === year
        );

        if (existingIndex !== -1) {
            tariff.data.calculations[existingIndex] = data;
            showMessage(`✅ Расчет за ${monthNames[month]} ${year} обновлен`, 'success');
        } else {
            tariff.data.calculations.push(data);
            showMessage(`✅ Расчет за ${monthNames[month]} ${year} сохранен`, 'success');
        }

        // Сортируем по дате
        tariff.data.calculations.sort((a, b) => {
            if (a.year !== b.year) return b.year - a.year;
            return b.month - a.month;
        });

        // Обновляем стартовый месяц если нужно
        if (!tariff.data.startMonth ||
            year < tariff.data.startYear ||
            (year === tariff.data.startYear && month < tariff.data.startMonth)) {
            tariff.data.startMonth = month;
            tariff.data.startYear = year;
        }

        // Сохраняем в localStorage
        localStorage.setItem('dynamicTariffs', JSON.stringify(dynamicTariffs));


        // Обновляем интерфейс
        updateDynamicHistory(tariffId);
        updateDataInfo(tariffId, true);
        updateMonthSelectorsForAllTariffs(tariffId);

        setTimeout(() => {
            updateInputFieldsState(tariffId);
        }, 100);
        scheduleAutoSync();
    }

    function updateDynamicHistory(tariffId) {
        const tariff = dynamicTariffs.tariffs.find(t => t.id === tariffId);
        if (!tariff) return;

        const historyElement = document.getElementById(`tariff_${tariffId}_history_content`);
        if (!historyElement) return;

        const calculations = tariff.data?.calculations || [];

        if (calculations.length === 0) {
            historyElement.innerHTML = '<div class="no-data">Нет сохраненных данных</div>';
            return;
        }

        const isTwoTariff = tariff.type === 'two';

        let html = `
            <table class="history-table">
                <thead>
                    <tr>
                        <th>Месяц</th>
                        ${isTwoTariff ?
            '<th>Т1</th><th>Т2</th>' :
            '<th>Т1</th><th>Т2</th><th>Т3</th>'
        }
                        <th>Сумма</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody>
        `;

        calculations.sort((a, b) => {
            if (a.year !== b.year) return b.year - a.year;
            return b.month - a.month;
        }).forEach(calc => {
            html += `
                <tr onclick="loadRecordFromDynamicHistory(${tariffId}, ${calc.id})" style="cursor: pointer;">
                    <td>${monthNames[calc.month]} ${calc.year}</td>
                    <td>${calc.zones[0]?.consumption || 0} кВт·ч</td>
                    <td>${calc.zones[1]?.consumption || 0} кВт·ч</td>
                    ${!isTwoTariff ? `<td>${calc.zones[2]?.consumption || 0} кВт·ч</td>` : ''}
                    <td>${calc.totalCost.toFixed(2)} руб.</td>
                    <td style="text-align: center;">
                        <button class="btn btn-danger btn-icon delete-btn" onclick="event.stopPropagation(); deleteDynamicCalculation(${tariffId}, ${calc.id})">
                            <span class="icon-mask icon-mask-delete"></span>
                        </button>
                    </td>
                </tr>
            `;
        });

        html += '</tbody></table>';
        historyElement.innerHTML = html;
    }

    function loadRecordFromDynamicHistory(tariffId, recordId) {
        const tariff = dynamicTariffs.tariffs.find(t => t.id === tariffId);
        if (!tariff) return;

        const record = tariff.data?.calculations?.find(calc => calc.id === recordId);
        if (!record) return;

        // Устанавливаем месяц и год
        const monthSelect = document.getElementById(`tariff_${tariffId}_month`);
        const yearSelect = document.getElementById(`tariff_${tariffId}_year`);

        if (monthSelect) monthSelect.value = record.month;
        if (yearSelect) yearSelect.value = record.year;

        // Заполняем поля ввода
        record.zones?.forEach((zone, index) => {
            const zoneNum = index + 1;
            const startInput = document.getElementById(`tariff_${tariffId}_t${zoneNum}_start`);
            const endInput = document.getElementById(`tariff_${tariffId}_t${zoneNum}_end`);

            if (startInput) startInput.value = zone.start || '';
            if (endInput) endInput.value = zone.end || '';
        });

        // Показываем результат
        const resultContent = document.getElementById(`tariff_${tariffId}_result_content`);
        const resultContainer = document.getElementById(`tariff_${tariffId}_result`);

        if (resultContent && resultContainer) {
            let resultHTML = '';

            record.zones?.forEach((zone, index) => {
                resultHTML += `
                <div class="result-item">
                    <span>${zone.zone} (${zone.hours}):</span>
                    <span>${zone.consumption} кВт·ч</span>
                </div>
                <div class="result-item">
                    <span>Стоимость Т${index + 1}:</span>
                    <span>${zone.cost.toFixed(2)} руб.</span>
                </div>
            `;
            });

            resultHTML += `
            <div class="result-item total">
                <span>Общее потребление:</span>
                <span>${record.totalConsumption} кВт·ч</span>
            </div>
            <div class="result-item total">
                <span>Общая стоимость:</span>
                <span>${record.totalCost.toFixed(2)} руб.</span>
            </div>
        `;

            resultContent.innerHTML = resultHTML;
            resultContainer.style.display = 'block';
        }

        // ВЫДЕЛЕНИЕ СТРОКИ
        const rows = document.querySelectorAll(`#tariff_${tariffId}_history_content tr`);
        rows.forEach(row => {
            row.style.backgroundColor = '';
            row.style.color = '';
        });

        let currentRow = null;
        rows.forEach((row, index) => {
            if (index > 0) { // Пропускаем заголовок
                const cells = row.querySelectorAll('td');
                if (cells.length > 0) {
                    const monthText = cells[0].textContent;
                    if (monthText === `${monthNames[record.month]} ${record.year}`) {
                        currentRow = row;
                        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                        row.style.backgroundColor = isDark ? 'rgba(59, 130, 246, 0.25)' : 'rgba(59, 130, 246, 0.1)';
                        row.style.color = 'var(--text-primary)';
                    }
                }
            }
        });

        // Обновляем блокировку
        updateMonthSelectorsForAllTariffs(tariffId);

        showMessage(`Загружена запись: ${monthNames[record.month]} ${record.year}`, 'info');
    }

    function deleteDynamicCalculation(tariffId, recordId) {
        const tariff = dynamicTariffs.tariffs.find(t => t.id === tariffId);
        if (!tariff) return;

        const record = tariff.data?.calculations?.find(calc => calc.id === recordId);
        if (!record) return;

        // ПРОВЕРКА НА ВОЗМОЖНОСТЬ УДАЛЕНИЯ
        if (!canDeleteRecord(tariffId, recordId)) {
            const calculations = tariff.data?.calculations || [];
            if (calculations.length > 0) {
                const newestRecord = calculations[0];
                showMessage(
                    `❌ Сначала удалите более новую запись: ${monthNames[newestRecord.month]} ${newestRecord.year}`,
                    'error',
                    4000
                );
            }
            return;
        }

        // Остальной код удаления
        showConfirmation({
            title: 'Удаление записи',
            message: `Вы уверены, что хотите удалить запись за <strong>${monthNames[record.month]} ${record.year}</strong>?`,
            details: `Тариф: ${tariff.name}<br>Сумма: ${record.totalCost.toFixed(2)} руб.`,
            iconType: 'danger',
            confirmText: 'Удалить',
            cancelText: 'Отмена',
            confirmBtnClass: 'confirmation-btn-danger',
            onConfirm: `confirmDeleteDynamicCalculation(${tariffId}, ${recordId})`
        });
    }

    function confirmDeleteDynamicCalculation(tariffId, recordId) {
        const tariff = dynamicTariffs.tariffs.find(t => t.id === tariffId);
        if (!tariff || !tariff.data?.calculations) return;

        const deletedRecord = tariff.data.calculations.find(calc => calc.id === recordId);
        if (!deletedRecord) return;

        // Удаляем запись
        tariff.data.calculations = tariff.data.calculations.filter(calc => calc.id !== recordId);

        // Обновляем стартовую точку
        updateStartPointAfterDeletion(tariffId);

        // Обновляем блокировку
        updateMonthSelectorsForAllTariffs(tariffId);

        // Сохраняем
        localStorage.setItem('dynamicTariffs', JSON.stringify(dynamicTariffs));


        // Обновляем историю
        updateDynamicHistory(tariffId);

        updateInputFieldsState(tariffId);

        // Проверяем, не удалили ли текущий месяц
        const currentMonth = parseInt(document.getElementById(`tariff_${tariffId}_month`).value);
        const currentYear = parseInt(document.getElementById(`tariff_${tariffId}_year`).value);

        if (deletedRecord.month === currentMonth && deletedRecord.year === currentYear) {
            // Очищаем поля ввода
            const zonesCount = tariff.type === 'two' ? 2 : 3;
            for (let i = 1; i <= zonesCount; i++) {
                const startInput = document.getElementById(`tariff_${tariffId}_t${i}_start`);
                const endInput = document.getElementById(`tariff_${tariffId}_t${i}_end`);

                if (startInput) startInput.value = '';
                if (endInput) endInput.value = '';
            }

            // Скрываем результат
            const resultContainer = document.getElementById(`tariff_${tariffId}_result`);
            if (resultContainer) resultContainer.style.display = 'none';

            // Показываем сообщение
            const infoDiv = document.getElementById(`tariff_${tariffId}_data_info`);
            if (infoDiv) {
                infoDiv.innerHTML = 'Запись удалена, форма очищена';
                infoDiv.style.display = 'block';
                infoDiv.style.color = 'var(--warning-color)';
                infoDiv.style.background = 'rgba(245, 158, 11, 0.1)';

                setTimeout(() => {
                    infoDiv.style.display = 'none';
                }, 3000);
            }
        }

        showMessage(`Запись удалена: ${monthNames[deletedRecord.month]} ${deletedRecord.year}`, 'info');
        scheduleAutoSync();
    }

    function clearDynamicHistory(tariffId) {
        const tariff = dynamicTariffs.tariffs.find(t => t.id === tariffId);
        if (!tariff) return;

        // ПРОВЕРЯЕМ ЕСТЬ ЛИ ДАННЫЕ
        const hasCalculations = tariff.data?.calculations?.length > 0;

        if (!hasCalculations) {
            // Используем существующую функцию модалки
            showConfirmation({
                title: 'Нет данных',
                message: `У тарифа <strong>"${tariff.name}"</strong> нет данных для очистки.`,
                iconType: 'info',
                confirmText: 'OK',
                cancelText: null, // Скрываем кнопку отмены
                confirmBtnClass: 'confirmation-btn-info',
                onConfirm: '' // Пусто - просто закрыть
            });
            return;
        }

        // Есть данные - показываем модалку подтверждения
        showConfirmation({
            title: 'Очистка истории',
            message: `Вы уверены, что хотите очистить всю историю расчетов для тарифа <strong>"${tariff.name}"</strong>?`,
            details: `Будет удалено: ${tariff.data.calculations.length} записей\n\n✅Автоматически создастся резервная копия данных этого тарифа`,
            iconType: 'danger',
            confirmText: 'Очистить',
            cancelText: 'Отмена',
            confirmBtnClass: 'confirmation-btn-danger',

        });

    function confirmClearDynamicHistory(tariffId) {
        const tariff = dynamicTariffs.tariffs.find(t => t.id === tariffId);
        if (!tariff || !tariff.data) return;

        const recordCount = tariff.data.calculations?.length || 0;

        // Создаем резервную копию этого тарифа
        const backupData = {
            version: 'dynamic',
            exportType: 'backup_before_clear',
            exportDate: new Date().toISOString(),
            clearedTariff: {
                id: tariff.id,
                name: tariff.name,
                type: tariff.type,
                originalCount: recordCount
            },
            tariffData: JSON.parse(JSON.stringify(tariff)),
            metadata: {
                operation: `clear_tariff_${tariff.id}_history`,
                clearedRecords: recordCount,
                originalState: 'Данные тарифа перед очисткой'
            }
        };

        // Скачиваем резервную копию
        const blob = new Blob([JSON.stringify(backupData, null, 2)], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `tariff_backup_${tariff.name}_${new Date().toISOString().split('T')[0]}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);

        // Очищаем данные тарифа
        tariff.data.calculations = [];
        tariff.data.startMonth = null;
        tariff.data.startYear = null;

        // Сохраняем изменения
        localStorage.setItem('dynamicTariffs', JSON.stringify(dynamicTariffs));


        // Обновляем интерфейс
        updateDynamicHistory(tariffId);
        scheduleAutoSync();
        // Обновляем блокировку
        updateMonthSelectorsForAllTariffs(tariffId);

        // Очищаем текущую форму если она активна
        const zonesCount = tariff.type === 'two' ? 2 : 3;
        for (let i = 1; i <= zonesCount; i++) {
            const startInput = document.getElementById(`tariff_${tariffId}_t${i}_start`);
            const endInput = document.getElementById(`tariff_${tariffId}_t${i}_end`);

            if (startInput) startInput.value = '';
            if (endInput) endInput.value = '';
        }

        // Скрываем результат
        const resultContainer = document.getElementById(`tariff_${tariffId}_result`);
        if (resultContainer) resultContainer.style.display = 'none';

        // Показываем сообщение
        let message = `✅ История тарифа "${tariff.name}" очищена\n` +
            `Удалено: ${recordCount} записей\n` +
            `Создана резервная копия`;

        showMessage(message, 'success', 5000);
    }

    function saveTariffName(tariffId) {
        const nameInput = document.getElementById('edit-tariff-name');
        const messageDiv = document.getElementById('edit-tariff-message');

        if (!nameInput) return;

        const newName = nameInput.value.trim();

        if (!newName) {
            if (messageDiv) {
                messageDiv.textContent = 'Введите название тарифа';
                messageDiv.style.display = 'block';
                messageDiv.style.background = 'var(--error-color)';
                messageDiv.style.color = 'white';
            }
            return;
        }

        // Проверяем, нет ли уже тарифа с таким именем (кроме текущего)
        if (dynamicTariffs.tariffs.some(t => t.name === newName && t.id !== tariffId)) {
            if (messageDiv) {
                messageDiv.textContent = 'Тариф с таким именем уже существует';
                messageDiv.style.display = 'block';
                messageDiv.style.background = 'var(--error-color)';
                messageDiv.style.color = 'white';
            }
            return;
        }

        // Обновляем тариф
        const tariffIndex = dynamicTariffs.tariffs.findIndex(t => t.id === tariffId);
        if (tariffIndex === -1) return;

        const oldName = dynamicTariffs.tariffs[tariffIndex].name;
        dynamicTariffs.tariffs[tariffIndex].name = newName;
        dynamicTariffs.tariffs[tariffIndex].updatedAt = new Date().toISOString();

        // Сохраняем данные
        localStorage.setItem('dynamicTariffs', JSON.stringify(dynamicTariffs));


        // 1. Обновляем имя в карусели
        const carouselItem = document.querySelector(`[data-tariff-id="${tariffId}"] .tab-text`);
        if (carouselItem) {
            carouselItem.textContent = newName;
        }

        // 2. Обновляем заголовок в контейнере тарифа
        const container = document.getElementById(`tariff-content-${tariffId}`);
        if (container) {
            // Ищем заголовок h2 внутри контейнера
            const h2 = container.querySelector('h2');
            if (h2 && h2.textContent.includes('Учет:')) {
                h2.textContent = `Учет: ${newName}`;
            }
        }

        // Закрываем модалку
        closeEditTariffModal();

        // Показываем сообщение
        showMessage(`✅ Тариф "${oldName}" переименован в "${newName}"`, 'success');
        scheduleAutoSync();

        // 3. Если тариф сейчас активен - обновляем интерфейс
        if (currentTariffId === tariffId) {
            setTimeout(() => {
                // Просто перезагружаем данные для текущего месяца
                if (typeof loadDynamicMonthData === 'function') {
                    loadDynamicMonthData(tariffId);
                }
            }, 50);
        }
    }

    function saveDiscountSettings() {
        const discountInput = document.getElementById('global-discount');
        if (!discountInput) return;

        let newDiscount = parseFloat(discountInput.value);
        if (isNaN(newDiscount)) newDiscount = 0;
        if (newDiscount < 0) newDiscount = 0;
        if (newDiscount > 100) newDiscount = 100;

        const oldDiscount = appSettings.globalDiscount || 0;
        appSettings.globalDiscount = newDiscount;
        localStorage.setItem('appSettings', JSON.stringify(appSettings));

        // Показываем сообщение
        if (newDiscount > 0) {
            showMessage(`✅ Льготная скидка установлена: ${newDiscount}%\nВсе новые расчёты будут со скидкой`, 'success', 4000);

    async function exportAllDataNew() {
        if (!dynamicTariffs || !dynamicTariffs.tariffs) {
            showMessage('Нет данных для экспорта', 'error');
            return;
        }

        const data = {
            version: '4.0',
            exportDate: new Date().toISOString(),
            app: 'Electricity Calculator',
            dynamicTariffs: dynamicTariffs,
            githubSettings: {
                enabled: githubSettings.enabled,
                gistId: githubSettings.gistId,
                autoCheck: githubSettings.autoCheck,
                lastSync: githubSettings.lastSync,
                lastCheck: githubSettings.lastCheck
            },
            appVersion: '4.0.0'
        };

        const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});

        try {
            // Только для современных браузеров
            if (window.showSaveFilePicker) {
                return await handleModernExport(blob);
            } else {
                handleLegacyExport(blob);
            }
        } catch (err) {
            handleExportError(err);
        }
    }

    async function handleModernExport(blob) {
        const handle = await window.showSaveFilePicker({
            suggestedName: `electricity_backup_${new Date().toISOString().split('T')[0]}.json`,
            types: [{
                description: 'JSON файл',
                accept: {'application/json': ['.json']}
            }]
        });

        const writable = await handle.createWritable();
        await writable.write(blob);
        await writable.close();

        showMessage(
            `<strong>✅ Экспорт завершен</strong><br>
         • Тарифов: ${dynamicTariffs.tariffs.length}<br>
         • Файл сохранен`,
            'success',
            5000
        );
    }

    function handleLegacyExport(blob) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `electricity_backup_${new Date().toISOString().split('T')[0]}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);

        let totalRecords = 0;
        dynamicTariffs.tariffs.forEach(tariff => {
            totalRecords += tariff.data?.calculations?.length || 0;
        });

        showMessage(
            `<strong>✅ Экспорт завершен</strong><br>
         • Тарифов: ${dynamicTariffs.tariffs.length}<br>
         • Записей: ${totalRecords}<br>
         • Файл скачан`,
            'success',
            5000
        );
    }

    function handleExportError(err) {
        if (err.name === 'AbortError') {
            showMessage('Экспорт отменен', 'info');
        } else {
            showMessage(`Ошибка экспорта: ${err.message}`, 'error');
            console.error('Export error:', err);
        }
    }

    async function handleFileSelect(event) {
        const file = event.target.files[0];
        if (!file) {
            event.target.value = '';
            return;
        }

        try {
            const text = await file.text();
            const data = JSON.parse(text);

            if (data.version === 'dynamic' && data.tariffData) {
                const tariffName = data.clearedTariff?.name;
                const tariffId = data.clearedTariff?.id;

                let existingTariff = dynamicTariffs.tariffs.find(t => t.id === tariffId);

                if (existingTariff) {
                    const index = dynamicTariffs.tariffs.findIndex(t => t.id === tariffId);
                    dynamicTariffs.tariffs[index] = data.tariffData;
                } else {
                    dynamicTariffs.tariffs.push(data.tariffData);
                    if (data.tariffData.id >= dynamicTariffs.nextId) {
                        dynamicTariffs.nextId = data.tariffData.id + 1;
                    }
                }

                localStorage.setItem('dynamicTariffs', JSON.stringify(dynamicTariffs));

                renderCarousel();
                if (currentTariffId === tariffId || !currentTariffId) {
                    switchToDynamicTariff(data.tariffData.id);
                }

                showMessage(`✅ Тариф "${tariffName}" восстановлен`, 'success');
                scheduleAutoSync();
                event.target.value = '';
                return;
            }

            // Обычный импорт (полный бэкап)
            if (!data.dynamicTariffs) {
                throw new Error('Неверный формат файла');
            }

            localStorage.setItem('dynamicTariffs', JSON.stringify(data.dynamicTariffs));
            dynamicTariffs = data.dynamicTariffs;

            if (typeof renderCarousel === 'function') renderCarousel();
            if (typeof updateCarouselPositions === 'function') updateCarouselPositions();

            if (data.dynamicTariffs.tariffs?.length > 0) {
                const firstTariff = data.dynamicTariffs.tariffs[0];
                if (typeof switchToDynamicTariff === 'function') {
                    switchToDynamicTariff(firstTariff.id);
                }
            }

            showMessage('✅ Импорт завершен', 'success');
            scheduleAutoSync();

        } catch (error) {
            showMessage(`❌ Ошибка: ${error.message}`, 'error');
            console.error(error);
        } finally {
            event.target.value = '';
        }
    }

    async function importData(importedData) {
        try {
            // Резервное копирование текущих данных перед импортом
            const backup = {
                version: '4.0',
                exportDate: new Date().toISOString(),
                dynamicTariffs: JSON.parse(JSON.stringify(dynamicTariffs)),
                githubSettings: JSON.parse(JSON.stringify(githubSettings || {})),
                metadata: {
                    operation: 'pre_import_backup',
                    reason: 'Автоматическое резервное копирование перед импортом'
                }
            };

            // Сохраняем резервную копию в localStorage
            localStorage.setItem('pre_import_backup', JSON.stringify(backup));

            // Импортируем основные данные
            if (importedData.dynamicTariffs) {
                localStorage.setItem('dynamicTariffs', JSON.stringify(importedData.dynamicTariffs));
                dynamicTariffs = importedData.dynamicTariffs;
            }

            // Импортируем настройки GitHub если есть
            if (importedData.githubSettings) {
                localStorage.setItem('githubSettings', JSON.stringify(importedData.githubSettings));
                githubSettings = importedData.githubSettings;
            }

            // Обновляем последний активный тариф если есть в импорте
            if (importedData.dynamicTariffs?.tariffs?.length > 0) {
                const firstTariff = importedData.dynamicTariffs.tariffs[0];
                localStorage.setItem('lastActiveTariff', firstTariff.id.toString());
                currentTariffId = firstTariff.id;
            }

            return true;
        } catch (error) {
            console.error('Import data error:', error);

            // Пытаемся восстановиться из резервной копии
            try {
                const backup = localStorage.getItem('pre_import_backup');
                if (backup) {
                    const backupData = JSON.parse(backup);
                    localStorage.setItem('dynamicTariffs', JSON.stringify(backupData.dynamicTariffs));
                    if (backupData.githubSettings) {
                        localStorage.setItem('githubSettings', JSON.stringify(backupData.githubSettings));
                    }
                }
            } catch (restoreError) {
                console.error('Restore from backup failed:', restoreError);
            }

            throw error;
        }
    }

    // Функция для восстановления из резервной копии (на случай проблем)
    function restoreFromBackup() {
        try {
            const backup = localStorage.getItem('pre_import_backup');
            if (!backup) {
                showMessage('Резервная копия не найдена', 'info');
                return;
            }

            const backupData = JSON.parse(backup);

            showConfirmation(
                'Восстановление из резервной копии',
                `Найдена резервная копия от ${new Date(backupData.exportDate).toLocaleString()}<br>
             Восстановить данные?`,
                'warning',
                'Восстановить',
                'Отмена'
            ).then(confirmed => {
                if (confirmed) {
                    localStorage.setItem('dynamicTariffs', JSON.stringify(backupData.dynamicTariffs));
                    if (backupData.githubSettings) {
                        localStorage.setItem('githubSettings', JSON.stringify(backupData.githubSettings));
                    }
                    showMessage('✅ Данные восстановлены из резервной копии. Перезагрузите страницу.', 'success');
                }
            });
        } catch (error) {
            showMessage(`Ошибка восстановления: ${error.message}`, 'error');
        }
    }

    // Функция для форматирования дат
    function formatDate(dateString) {
        if (!dateString) return 'никогда';
        try {
            const date = new Date(dateString);
            return date.toLocaleString('ru-RU', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        } catch (e) {
            return dateString;
        }
    }

    async function updateGitHubIndicator(forceConnected = false, checkUpdates = false) {
        const icon = document.getElementById('github-status-icon');
        if (!icon) return;

        icon.className = 'icon-mask icon-mask-cloud github-status-icon';

        // Если выбран локальный режим — облачко серое
        if (appSettings.syncProvider === 'local') {
            icon.classList.add('disconnected');
            return;
        }

        // Если выбран Google Drive
        if (appSettings.syncProvider === 'google') {
            const isGoogleConnected = localStorage.getItem('google_access_token') !== null;
            if (isGoogleConnected) {
                icon.classList.add('connected');
            } else {
                icon.classList.add('disconnected');
            }
            return;
        }

        // GitHub (оставляем старую логику)
        if (!githubSettings.enabled) {
            icon.classList.add('disconnected');
            return;
        }

        if (!githubSettings.token) {
            icon.classList.add('disconnected');
            return;
        }

        if (forceConnected === true) {
            icon.classList.add('connected');
        } else if (githubSettings.lastSync) {
            icon.classList.add('connected');
        } else {
            icon.classList.add('update_available');
        }

        if (checkUpdates || githubSettings.autoCheck) {
            setTimeout(async () => {
                try {
                    const hasUpdates = await checkForCloudUpdates();
                    if (hasUpdates === 'error') {
                        icon.classList.remove('connected', 'update_available');
                        icon.classList.add('error');
                    } else if (hasUpdates === true) {
                        icon.classList.remove('connected');
                        icon.classList.add('update_available');
                    } else if (hasUpdates === false) {
                        icon.classList.remove('update_available');
                        icon.classList.add('connected');
                    }
                } catch (error) {
                    console.error('Ошибка фоновой проверки:', error);
                }
            }, 1000);
        }
    }

    async function checkForCloudUpdates() {

        if (!githubSettings.enabled || !githubSettings.token || !githubSettings.gistId) {
            return false;
        }

        if (!githubSettings.lastSync) {
            return true; // ← ГЛАВНОЕ ИСПРАВЛЕНИЕ
        }

        try {
            const response = await fetch(`https://api.github.com/gists/${githubSettings.gistId}`, {
                headers: {'Authorization': `token ${githubSettings.token}`}
            });

            if (!response.ok) {
                if (response.status === 401 || response.status === 403) return 'error';
                return false;
            }

            const gist = await response.json();
            const fileContent = gist.files['electricity_data.json']?.content;
            if (!fileContent) return false;

            const cloudData = JSON.parse(fileContent);

            // Простая проверка: есть ли данные в облаке
            const hasCloudData = cloudData.dynamicTariffs?.tariffs?.length > 0;
            const hasLocalData = dynamicTariffs.tariffs?.length > 0;


            // Если в облаке есть данные, а у нас нет - есть обновления
            if (hasCloudData && !hasLocalData) {
                return true;
            }

            // Простое сравнение количества
            const localCount = dynamicTariffs.tariffs?.length || 0;
            const cloudCount = cloudData.dynamicTariffs?.tariffs?.length || 0;

            if (localCount !== cloudCount) {
                return true;
            }

            return false;

        } catch (error) {
            console.error('🔥 Ошибка:', error);
            return 'error';
        }
    }

    // Создаем функцию testGitHubToken
    window.testGitHubToken = async function (token, gistId = '') {

        try {
            // 1. Проверяем что токен валидный
            const userResponse = await fetch('https://api.github.com/user', {
                headers: {
                    'Authorization': `token ${token}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'User-Agent': 'Electricity-Calculator'
                }
            });

            if (!userResponse.ok) {
                const errorText = await userResponse.text();
                console.error('❌ Ошибка проверки токена:', userResponse.status, errorText);

                if (userResponse.status === 401) {
                    return {error: 'Неверный токен. Убедитесь что токен правильный и имеет права gist.'};
                }
                return {error: `Ошибка GitHub: ${userResponse.status}`};
            }

            const userData = await userResponse.json();

            // 2. Если gistId указан - проверяем его
            if (gistId) {

                const gistResponse = await fetch(`https://api.github.com/gists/${gistId}`, {
                    headers: {
                        'Authorization': `token ${token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });

                if (!gistResponse.ok) {
                    if (gistResponse.status === 404) {
                        return {error: 'Gist не найден. Проверьте ID или оставьте поле пустым для создания нового.'};
                    }
                    if (gistResponse.status === 403) {
                        return {error: 'Нет доступа к Gist. Убедитесь что токен имеет права gist.'};
                    }
                    return {error: `Ошибка доступа к Gist: ${gistResponse.status}`};
                }

                const gistData = await gistResponse.json();

                return {
                    success: true,
                    gistId: gistId,
                    gistData: gistData
                };
            }
            // 3. Если gistId не указан - создаем новый
            else {

                const createResponse = await fetch('https://api.github.com/gists', {
                    method: 'POST',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        description: 'Electricity Calculator Data Backup',
                        public: false,
                        files: {
                            'electricity_data.json': {
                                content: JSON.stringify({
                                    version: '1.0',
                                    created: new Date().toISOString(),
                                    lastSync: null,
                                    data: {}
                                }, null, 2)
                            }
                        }
                    })
                });

                if (!createResponse.ok) {
                    const errorText = await createResponse.text();
                    console.error('❌ Ошибка создания Gist:', createResponse.status, errorText);
                    return {error: `Не удалось создать Gist: ${createResponse.status}`};
                }

                const newGist = await createResponse.json();

                return {
                    success: true,
                    createdGistId: newGist.id,
                    gistId: newGist.id,
                    gistData: newGist
                };
            }

        } catch (error) {
            console.error('❌ Ошибка сети:', error);

            // Проверяем подключение к интернету
            if (!navigator.onLine) {
                return {error: 'Нет подключения к интернету. Проверьте сеть.'};
            }

            // Проверяем CORS ошибки
            if (error.message.includes('Failed to fetch') || error.message.includes('NetworkError')) {
                return {error: 'Сетевая ошибка. Проверьте подключение к GitHub.'};
            }

            return {error: error.message || 'Неизвестная ошибка'};
        }
    };

    async function syncToGitHub() {
        if (!githubSettings.enabled || !githubSettings.token) return;

        try {
            const dataToSave = {
                version: '4.0',
                exportDate: new Date().toISOString(),
                app: 'Electricity Calculator',
                dynamicTariffs: dynamicTariffs,
                githubSettings: {
                    enabled: githubSettings.enabled,
                    gistId: githubSettings.gistId,
                    autoCheck: githubSettings.autoCheck,
                    lastSync: githubSettings.lastSync,
                    lastCheck: githubSettings.lastCheck
                },
                appVersion: '4.0.0'
            };

            const gistData = {
                files: {
                    'electricity_data.json': {
                        content: JSON.stringify(dataToSave, null, 2)
                    }
                },
                description: 'Данные калькулятора электроэнергии',
                public: false
            };

            let response;
            if (githubSettings.gistId) {
                response = await fetch(`https://api.github.com/gists/${githubSettings.gistId}`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `token ${githubSettings.token}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/vnd.github.v3+json'
                    },
                    body: JSON.stringify(gistData)
                });
            } else {
                response = await fetch('https://api.github.com/gists', {
                    method: 'POST',
                    headers: {
                        'Authorization': `token ${githubSettings.token}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/vnd.github.v3+json'
                    },
                    body: JSON.stringify(gistData)
                });

                if (response.ok) {
                    const result = await response.json();
                    githubSettings.gistId = result.id;
                    localStorage.setItem('githubSettings', JSON.stringify(githubSettings));
                }
            }

            if (response && !response.ok) throw new Error(`GitHub API ошибка: ${response.status}`);

            githubSettings.lastSync = new Date().toISOString();
            localStorage.setItem('githubSettings', JSON.stringify(githubSettings));

            updateGitHubIndicator(true);
            showMessage('✅ Данные сохранены в облако', 'success', 3000);

        } catch (error) {
            console.error('Sync error:', error);
            showMessage(`❌ Ошибка сохранения: ${error.message}`, 'error');
            updateGitHubIndicator();
        }
    }

    async function loadFromGitHub() {
        if (!githubSettings.enabled || !githubSettings.token || !githubSettings.gistId) {
            showMessage('Синхронизация не настроена', 'warning');
            return;
        }

        try {
            const response = await fetch(`https://api.github.com/gists/${githubSettings.gistId}`, {
                headers: {'Authorization': `token ${githubSettings.token}`}
            });

            if (!response.ok) throw new Error(`Ошибка: ${response.status}`);

            const gist = await response.json();
            const fileContent = gist.files['electricity_data.json']?.content;
            if (!fileContent) throw new Error('Файл не найден');

            const cloudData = JSON.parse(fileContent);

            dynamicTariffs = cloudData.dynamicTariffs || {nextId: 1, tariffs: []};
            localStorage.setItem('dynamicTariffs', JSON.stringify(dynamicTariffs));

            const emptyState = document.querySelector('.empty-state');
            if (emptyState) emptyState.remove();

            githubSettings.lastSync = new Date().toISOString();
            localStorage.setItem('githubSettings', JSON.stringify(githubSettings));

            updateGitHubIndicator(true);
            showMessage('✅ Данные загружены из облака', 'success', 3000);

            setTimeout(() => {
                if (typeof renderCarousel === 'function') renderCarousel();
                if (dynamicTariffs.tariffs.length > 0) {
                    const firstTariff = dynamicTariffs.tariffs[0];
                    if (firstTariff && typeof switchToDynamicTariff === 'function') {
                        switchToDynamicTariff(firstTariff.id);
                    }
                }
            }, 100);

            closeAllMenus();

        } catch (error) {
            console.error('Load error:', error);
            showMessage(`❌ Ошибка: ${error.message}`, 'error');
            updateGitHubIndicator();
        }
    }

    function showMessage(message, type = 'info', duration = 3000) {
        const container = document.getElementById('toast-container') || (() => {
            const div = document.createElement('div');
            div.id = 'toast-container';
            div.className = 'toast-container';
            document.body.appendChild(div);
            return div;
        })();

        const toastId = 'toast-' + Date.now();
        const toast = document.createElement('div');
        toast.id = toastId;
        toast.className = `toast-notification ${type}`;

        let icon = '';
        switch (type) {
            case 'success':
                icon = '<span class="icon-mask icon-mask-check" style="background-color: white;"></span>';
                break;
            case 'error':
                icon = '<span class="icon-mask icon-mask-warning" style="background-color: white;"></span>';
                break;
            case 'warning':
                icon = '<span class="icon-mask icon-mask-warning" style="background-color: white;"></span>';
                break;
            default:
                icon = '<span class="icon-mask icon-mask-info" style="background-color: white;"></span>';
        }

        toast.innerHTML = `
            ${icon}
            <div class="toast-content">
                <strong>${type === 'success' ? 'Успешно' : type === 'error' ? 'Ошибка' : type === 'warning' ? 'Внимание' : 'Информация'}</strong>
                <p style="margin-top: 4px;">${message}</p>
            </div>
            <button class="toast-close" onclick="removeToast('${toastId}')">×</button>
            <div class="toast-progress"></div>
        `;

        container.appendChild(toast);

        // Автоматическое удаление
        toastTimers[toastId] = setTimeout(() => {
            removeToast(toastId);
        }, duration);

        return toastId;
    }

    function removeToast(toastId) {
        const toast = document.getElementById(toastId);
        if (!toast) return;

        toast.classList.add('hiding');
        setTimeout(() => {
            if (toast && toast.parentNode) {
                toast.parentNode.removeChild(toast);
            }
            delete toastTimers[toastId];
        }, 300);

        if (toastTimers[toastId]) {
            clearTimeout(toastTimers[toastId]);
            delete toastTimers[toastId];
        }
    }

    // Инициализация карусели
    function initCarousel() {
        carouselContainer = document.getElementById('custom-carousel');
        carouselList = document.getElementById('tabs-carousel');
        if (!carouselContainer || !carouselList) return;

        renderCarousel();

        // Обработчики для мыши (drag)
        carouselContainer.addEventListener('mousedown', startDrag);
        carouselContainer.addEventListener('mousemove', drag);
        carouselContainer.addEventListener('mouseup', endDrag);
        carouselContainer.addEventListener('mouseleave', endDrag);

        // Обработчики для тач (drag)
        carouselContainer.addEventListener('touchstart', startDrag);
        carouselContainer.addEventListener('touchmove', drag);
        carouselContainer.addEventListener('touchend', endDrag);

        // Обработчик колесика
        carouselContainer.addEventListener('wheel', handleWheel);

        // Обработчик кликов для переключения тарифов
        document.addEventListener('click', function (event) {
            const clickedItem = event.target.closest('#tabs-carousel .carousel__item');
            if (!clickedItem) return;

            // Если кликнули по иконке - не переключаем тариф
            if (event.target.closest('.tab-edit') || event.target.closest('.tab-close')) {
                return;
            }

            const tariffId = clickedItem.dataset.tariffId;
            const clickedIndex = parseInt(clickedItem.dataset.index);

            if (!tariffId || isNaN(clickedIndex)) return;

            currentCenterIndex = clickedIndex;
            updateCarouselPositions();
            switchToDynamicTariff(parseInt(tariffId));
        });

        // Обработчик touch для мобильных (только для тарифов, не для иконок)
        document.addEventListener('touchstart', function (event) {
            const touchedItem = event.target.closest('#tabs-carousel .carousel__item');
            if (!touchedItem) return;

            // Если тапнули по иконке - выходим
            if (event.target.closest('.tab-edit') || event.target.closest('.tab-close')) {
                return;
            }

            const tariffId = touchedItem.dataset.tariffId;
            const clickedIndex = parseInt(touchedItem.dataset.index);

            if (!tariffId || isNaN(clickedIndex)) return;

            currentCenterIndex = clickedIndex;
            updateCarouselPositions();
            switchToDynamicTariff(parseInt(tariffId));

            event.preventDefault();
        }, {passive: false});
    }

    // Обработка колесика мыши
    function handleWheel(event) {
        event.preventDefault();

        // Определяем направление скролла
        if (event.deltaY > 0) {
            // Скролл вниз/вправо
            scrollCarousel(1);
        } else {
            // Скролл вверх/влево
            scrollCarousel(-1);
        }
    }

    // Функция прокрутки
    function scrollCarousel(direction) {
        if (carouselItems.length <= 1) return;

        currentCenterIndex += direction;

        // Корректируем индекс для бесконечной карусели
        if (currentCenterIndex < 0) {
            currentCenterIndex = carouselItems.length - 1;
        } else if (currentCenterIndex >= carouselItems.length) {
            currentCenterIndex = 0;
        }

        updateCarouselPositions();

        // Находим активный элемент
        const activeItem = carouselItems.find(item => parseInt(item.dataset.pos) === 0);
        if (activeItem) {
            const tariffId = parseInt(activeItem.dataset.tariffId);

            // Простое переключение тарифа
            if (currentTariffId !== tariffId) {
                // 1. Скрываем все контейнеры
                document.querySelectorAll('.tariff-content, #history-stats').forEach(el => {
                    el.style.display = 'none';
                });

                // 2. Показываем нужный тариф
                const selectedContainer = document.getElementById(`tariff-content-${tariffId}`);
                if (selectedContainer) {
                    selectedContainer.style.display = 'block';
                } else {
                    // Если контейнера нет — создаем
                    const tariff = dynamicTariffs.tariffs.find(t => t.id === tariffId);
                    if (tariff) {
                        createTariffContentContainer(tariff);
                        document.getElementById(`tariff-content-${tariffId}`).style.display = 'block';
                    }
                }

                // 3. Обновляем текущий тариф
                currentTariffId = tariffId;

                // 4. Загружаем данные для этого тарифа
                if (typeof loadDynamicMonthData === 'function') {
                    loadDynamicMonthData(tariffId);
                }
                if (typeof updateDynamicHistory === 'function') {
                    updateDynamicHistory(tariffId);
                }
            }
        }
    }

    // Функции для drag & drop
    function startDrag(event) {
        if (carouselItems.length <= 1) return;

        isDragging = true;
        carouselContainer.style.cursor = 'grabbing';

        // Получаем начальную позицию
        const clientX = event.type.includes('touch') ? event.touches[0].clientX : event.clientX;
        startX = clientX;
        currentX = startX;

        event.preventDefault();
    }

    function drag(event) {
        if (!isDragging) return;

        const clientX = event.type.includes('touch') ? event.touches[0].clientX : event.clientX;
        currentX = clientX;

        event.preventDefault();
    }

    function endDrag() {
        if (!isDragging) return;

        isDragging = false;
        carouselContainer.style.cursor = 'grab';

        // Вычисляем дистанцию перемещения
        const dragDistance = currentX - startX;

        // Если переместили достаточно далеко, меняем слайд
        if (Math.abs(dragDistance) > dragThreshold) {
            if (dragDistance > 0) {
                // Перетащили вправо - показываем предыдущий слайд
                scrollCarousel(-1);
            } else {
                // Перетащили влево - показываем следующий слайд
                scrollCarousel(1);
            }
        }

        startX = 0;
        currentX = 0;
    }

    // Рендер карусели
    function renderCarousel() {
        if (!carouselList) return;

        carouselList.innerHTML = '';
        const tariffs = dynamicTariffs.tariffs;

        if (tariffs.length === 0) {
            // Пустое состояние
            const emptyMsg = document.createElement('li');
            emptyMsg.className = 'carousel__item active';
            emptyMsg.dataset.pos = '0';
            emptyMsg.dataset.index = '0';
            emptyMsg.style.pointerEvents = 'none';
            emptyMsg.innerHTML = '<span class="tab-text">Нет тарифов</span>';
            carouselList.appendChild(emptyMsg);
            carouselItems = [emptyMsg];
            return;
        }

        // Создаем элементы
        tariffs.forEach((tariff, index) => {
            const li = document.createElement('li');
            li.className = 'carousel__item';
            li.dataset.index = index;
            li.dataset.tariffId = tariff.id;

            li.innerHTML = `
                <span class="tab-text">${tariff.name}</span>
                <span class="tab-edit" onclick="event.stopPropagation(); editTariffName(${tariff.id})">
                    <span class="icon-mask icon-mask-edit"></span>
                </span>
                <span class="tab-close" onclick="event.stopPropagation(); deleteTariff(${tariff.id})">
                    <span class="icon-mask icon-mask-close"></span>
                </span>
            `;

            carouselList.appendChild(li);
        });

        carouselItems = Array.from(carouselList.querySelectorAll('.carousel__item'));

        // Устанавливаем активный элемент
        if (currentTariffId) {
            const activeIndex = tariffs.findIndex(t => t.id === currentTariffId);
            if (activeIndex !== -1) {
                currentCenterIndex = activeIndex;
            }
        }

        updateCarouselPositions();
    }


    // Обновление позиций
    function updateCarouselPositions() {
        if (carouselItems.length === 0) return;

        const totalItems = carouselItems.length;

        // Убираем активный класс у всех
        carouselItems.forEach(item => item.classList.remove('active'));

        // Обновляем позиции
        carouselItems.forEach((item, index) => {
            const itemIndex = parseInt(item.dataset.index);
            let pos = itemIndex - currentCenterIndex;

            // Корректируем для бесконечной карусели
            if (totalItems > 1) {
                // Рассчитываем половину для отображения
                const half = Math.min(3, Math.floor(totalItems / 2));

                if (pos > half) {
                    pos = pos - totalItems;
                } else if (pos < -half) {
                    pos = pos + totalItems;
                }
            }

            // Скрываем элементы за пределами видимости
            if (Math.abs(pos) > 3) {
                item.style.display = 'none';
            } else {
                item.dataset.pos = pos;
                item.style.display = 'flex';

                // Устанавливаем активный класс центральному элементу
                if (pos === 0) {
                    item.classList.add('active');
                }
            }
        });
    }

    function handleCarouselClick(clickedItem, clickedPos) {
        const clickedIndex = parseInt(clickedItem.dataset.index);

        // Вычисляем новую центральную позицию
        currentCenterIndex = clickedIndex;

        // Корректируем индекс если вышли за границы
        if (currentCenterIndex < 0) {
            currentCenterIndex = carouselItems.length - 1;
        } else if (currentCenterIndex >= carouselItems.length) {
            currentCenterIndex = 0;
        }

        updateCarouselPositions();

        // Переключаемся на тариф
        const tariffId = parseInt(clickedItem.dataset.tariffId);
        if (tariffId) {
            switchToDynamicTariff(tariffId);
        }
    }

    // Функция расчета метрик calculateMetrics (адаптированная)
    function calculateMetrics(yearData, type) {
        if (!yearData || yearData.length === 0) return null;

        const monthsCount = yearData.length;

        // Основные метрики
        const totalT1 = yearData.reduce((sum, calc) => sum + (calc.zones[0]?.consumption || 0), 0);
        const totalT2 = yearData.reduce((sum, calc) => sum + (calc.zones[1]?.consumption || 0), 0);
        const totalT3 = type === 'three' ? yearData.reduce((sum, calc) => sum + (calc.zones[2]?.consumption || 0), 0) : 0;
        const totalCost = yearData.reduce((sum, calc) => sum + calc.totalCost, 0);
        const avgMonthly = totalCost / monthsCount;

        // Доли потребления
        const totalConsumption = totalT1 + totalT2 + totalT3;
        const nightShare = type === 'two'
            ? ((totalT2 / totalConsumption) * 100).toFixed(1)
            : ((totalT3 / totalConsumption) * 100).toFixed(1);

        // Средние расходы в месяц
        const avgT1perMonth = (totalT1 / monthsCount).toFixed(1);
        const avgT2perMonth = (totalT2 / monthsCount).toFixed(1);
        const avgT3perMonth = type === 'three' ? (totalT3 / monthsCount).toFixed(1) : null;

        // Самые дорогие/дешевые месяцы
        const mostExpensive = yearData.reduce((max, calc) =>
            calc.totalCost > max.totalCost ? calc : max, yearData[0]
        );
        const cheapest = yearData.reduce((min, calc) =>
            calc.totalCost < min.totalCost ? calc : min, yearData[0]
        );

        return {
            monthsCount,
            totalT1,
            totalT2,
            totalT3,
            totalCost,
            avgMonthly,
            totalConsumption,
            nightShare,
            avgT1perMonth,
            avgT2perMonth,
            avgT3perMonth,
            mostExpensive,
            cheapest
        };
    }

    function initApp() {

            if (!document.getElementById('custom-carousel')) {

                createTariffContentContainer(tariff);
            });

            // 4. Инициализируем карусель
            initCarousel();

            // 5. Переключаемся на последний тариф
            const lastActiveTariff = localStorage.getItem('lastActiveTariff');
            if (lastActiveTariff && dynamicTariffs.tariffs.length > 0) {
                const tariffId = parseInt(lastActiveTariff);
                if (dynamicTariffs.tariffs.some(t => t.id === tariffId)) {
                    switchToDynamicTariff(tariffId);
                }
            }

            // 6. Пустое состояние - ТОЛЬКО ОДИН РАЗ с задержкой
            setTimeout(() => {
                if (!dynamicTariffs?.tariffs?.length) {
                    showEmptyState();
                }
            }, 500);

            setTimeout(() => {
                // checkUpdates = true - проверим обновления в фоне
                updateGitHubIndicator(false, true);
            }, 1000);
            // Показываем соглашение один раз (если ещё не принимал)
            if (!localStorage.getItem('termsAccepted')) {
                setTimeout(() => {
                    showTermsOfUse();
                }, 800);

        importInput.id = 'import-file';
        importInput.accept = '.json';
        importInput.style.display = 'none';
        importInput.onchange = handleFileSelect;
        document.body.appendChild(importInput);

        // Автосохранение каждые 30 секунд
        setInterval(() => {
            if (appSettings.syncProvider === 'github' && githubSettings.enabled && githubSettings.token && dynamicTariffs.tariffs.length) {
                syncToGitHub().catch(e => console.error('Auto-sync error:', e));
            } else if (appSettings.syncProvider === 'google') {
                const token = localStorage.getItem('google_access_token');
                if (token && dynamicTariffs.tariffs.length) {
                    syncToGoogleDrive().catch(e => console.error('Auto-sync error:', e));
                }
            }
        }, 30000);
        // Автоматическая проверка обновлений GitHub при запуске
        if (githubSettings.autoCheck && githubSettings.enabled && githubSettings.token && githubSettings.gistId) {
            setTimeout(async () => {
                const hasUpdates = await checkForCloudUpdates();
                if (hasUpdates === true) {
                    showMessage('🟡 В GitHub Gist есть обновления. Нажмите "Загрузить из GitHub" в облачке.', 'warning', 5000);
                }
            }, 2000);
        }

    function editTariffPrices(tariffId) {
        const tariff = dynamicTariffs.tariffs.find(t => t.id === tariffId);
        if (!tariff) return;

        const isTwoTariff = tariff.type === 'two';
        const zonesCount = isTwoTariff ? 2 : 3;

        let tariffRowsHTML = '';

        for (let i = 0; i < zonesCount; i++) {
            const zoneLetter = ['T1', 'T2', 'T3'][i];
            const zoneName = tariff.zones[i];
            const currentPrice = tariff.tariffs[`t${i + 1}`];

            tariffRowsHTML += `
                <div class="tariff-row">
                    <div class="tariff-label t${i + 1}">${zoneLetter}</div>
                    <div class="tariff-name">${zoneName}</div>
                    <input type="number" class="tariff-input" id="edit_tariff_${tariffId}_t${i + 1}"
                           step="0.01" min="0" value="${currentPrice.toFixed(2)}"
                           style="text-align: right; padding: 8px 12px; font-size: 14px;">
                    <div class="tariff-unit">руб./кВт·ч</div>
                </div>
            `;
        }

        showConfirmation({
            title: 'Изменение тарифов',
            message: `Настройка цен для тарифа <strong>"${tariff.name}"</strong>`,
            details: tariffRowsHTML,
            iconType: 'info',
            confirmText: 'Сохранить',
            cancelText: 'Отмена',
            confirmBtnClass: 'confirmation-btn-success',
            onConfirm: `saveTariffPrices(${tariffId})`
        });
    }

    function saveTariffPrices(tariffId) {
        const tariff = dynamicTariffs.tariffs.find(t => t.id === tariffId);
        if (!tariff) return;

        const isTwoTariff = tariff.type === 'two';
        const zonesCount = isTwoTariff ? 2 : 3;
        let hasErrors = false;

        // Собираем новые значения
        for (let i = 0; i < zonesCount; i++) {
            const input = document.querySelector(`#edit_tariff_${tariffId}_t${i + 1}`);
            if (input) {
                const value = parseFloat(input.value);
                if (isNaN(value) || value < 0) {
                    hasErrors = true;
                    input.style.borderColor = 'var(--error-color)';
                    input.style.backgroundColor = 'rgba(239, 68, 68, 0.1)';
                } else {
                    tariff.tariffs[`t${i + 1}`] = value;
                }
            }
        }

        if (hasErrors) {
            showMessage('❌ Проверьте введенные значения тарифов', 'error');
            return;
        }

        // Обновляем данные
        tariff.updatedAt = new Date().toISOString();
        localStorage.setItem('dynamicTariffs', JSON.stringify(dynamicTariffs));


        // Обновляем интерфейс
        for (let i = 0; i < zonesCount; i++) {
            const priceElement = document.getElementById(`tariff_${tariffId}_price_t${i + 1}`);
            if (priceElement) {
                priceElement.textContent = `${tariff.tariffs[`t${i + 1}`].toFixed(2)} ₽`;
            }
        }

        showMessage(`✅ Тарифы для "${tariff.name}" обновлены`, 'success');
        scheduleAutoSync();
    }

    function updateMonthSelect(selectElement) {
        if (!selectElement) return;

        const currentMonth = new Date().getMonth();
        const monthOptions = selectElement.options;

        // Проходим по всем опциям и обновляем текст
        for (let i = 0; i < monthOptions.length; i++) {
            const monthOption = monthOptions[i];
            const month = parseInt(monthOption.value);

            // Обновляем текст месяца
            monthOption.textContent = monthNames[month];

            // Если это текущий месяц - делаем его выбранным по умолчанию
            if (month === currentMonth && !selectElement.value) {
                monthOption.selected = true;
            }
        }
    }

    // ФИКС: ТАП НА МОБИЛЬНЫХ = ХОВЕР
    (function () {
        'use strict';

        // Проверяем мобильное устройство
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent) ||
            (window.innerWidth <= 768 && window.outerWidth !== window.innerWidth);

        if (!isMobile) return; // Только для мобильных


        let tapTimer = null;
        let tappedItem = null;

        // Обработчик тапа на тариф
        function handleTariffTap(e) {
            const item = e.target.closest('.carousel__item');
            if (!item) return;

            // Если кликнули на иконку - не обрабатываем как тап на тариф
            if (e.target.closest('.tab-edit, .tab-close')) {
                return;
            }

            e.stopPropagation();

            // Убираем таймер
            if (tapTimer) {
                clearTimeout(tapTimer);
                // Убираем класс у предыдущего элемента
                if (tappedItem && tappedItem !== item) {
                    tappedItem.classList.remove('tapped');
                }
            }

            // Переключаем состояние
            const wasTapped = item.classList.contains('tapped');

            // Убираем у всех
            document.querySelectorAll('.carousel__item.tapped').forEach(el => {
                el.classList.remove('tapped');
            });

            // Если не был tapped - добавляем
            if (!wasTapped) {
                item.classList.add('tapped');
                tappedItem = item;

                // Авто-скрытие через 3 секунды
                tapTimer = setTimeout(() => {
                    item.classList.remove('tapped');
                    tappedItem = null;
                }, 3000);
            } else {
                tappedItem = null;
            }
        }

        // Обработчик клика на иконку
        function handleIconClick(e) {
            const icon = e.target.closest('.tab-edit, .tab-close');
            if (!icon) return;

            e.stopPropagation();
            e.preventDefault();

            // Убираем tapped класс
            const item = icon.closest('.carousel__item');
            if (item) {
                item.classList.remove('tapped');
                if (tappedItem === item) {
                    tappedItem = null;
                    if (tapTimer) {
                        clearTimeout(tapTimer);
                        tapTimer = null;
                    }
                }
            }

            // Выполняем оригинальный onclick
            const onclick = icon.getAttribute('onclick');
            if (onclick) {
                setTimeout(() => {
                    try {
                        // Создаем event для stopPropagation
                        const event = new MouseEvent('click', {
                            bubbles: true,
                            cancelable: true
                        });

                        const fn = new Function('event', onclick);
                        fn.call(icon, event);
                    } catch (err) {
                        console.error('Ошибка:', err);
                    }
                }, 10);
            }
        }

        // Вешаем обработчики
        document.addEventListener('click', handleTariffTap);
        document.addEventListener('touchstart', handleTariffTap, {passive: true});

        document.addEventListener('click', handleIconClick, true); // capturing phase
        document.addEventListener('touchend', handleIconClick, true);

        // ФИКС ДЛЯ DEVTOOLS: Делаем иконки видимыми при тапе
        if (window.innerWidth <= 768 && window.outerWidth !== window.innerWidth) {
            const style = document.createElement('style');
            style.textContent = `
            /* Для DevTools мобильного режима */
            .carousel__item.tapped .tab-edit,
            .carousel__item.tapped .tab-close {
                opacity: 1 !important;
            }
        `;
            document.head.appendChild(style);
        }
    })();

    // Добавляет индикатор скидки рядом с названием тарифа
    function updateDiscountInTariffTitle() {
        const discount = appSettings.globalDiscount || 0;

        const activeTariff = document.querySelector('.tariff-content[style*="display: block"]');

        const oldIndicator = activeTariff.querySelector('.discount-in-title');
        if (oldIndicator) oldIndicator.remove();

        // Если скидка есть — добавляем
        if (discount > 0) {
            const badge = document.createElement('span');
            badge.className = 'discount-in-title';
            badge.style.cssText = `
            background: linear-gradient(135deg, #10B981, #059669);
            padding: 4px 12px;
            border-radius: 30px;
            color: white;
            font-size: 12px;
            font-weight: 600;
            margin-left: 12px;
            cursor: pointer;
            display: inline-block;
            vertical-align: middle;
        `;
            badge.innerHTML = `🏷️ ${discount}%`;
            badge.onclick = (e) => {
                e.stopPropagation();
                showSettings();
            };

            // Добавляем в конец h2
            h2.appendChild(badge);

        const email = document.getElementById('license-email')?.value.trim();
        const key = document.getElementById('license-key')?.value.trim();

        if (!email || !key) {
            showMessage('❌ Введите email и ключ', 'error');

        }

        const validKey = generateKey(email);

        if (key === validKey) {
            appSettings.isPaid = true;
            appSettings.licenseEmail = email;
            localStorage.setItem('appSettings', JSON.stringify(appSettings));
            showMessage('✅ Полная версия активирована!', 'success');

            if (activationBlock) activationBlock.style.display = 'none';
            if (activatedMessage) {

            document.getElementById('license-key').value = '';

        }
    }

    async function loadGoogleDriveDataOnly() {
        const token = localStorage.getItem('google_access_token');
        if (!token) return null;
        try {
            const res = await fetch('https://www.googleapis.com/drive/v3/files?q=name=\'electricity_calculator_data.json\'&fields=files(id)', {
                headers: {'Authorization': `Bearer ${token}`}
            });
            const data = await res.json();
            if (!data.files || data.files.length === 0) return null;
            const fileId = data.files[0].id;
            const contentRes = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
                headers: {'Authorization': `Bearer ${token}`}
            });
            const cloudData = await contentRes.json();
            return JSON.stringify(cloudData.dynamicTariffs);
        } catch (e) {
            return null;
        }
    }
